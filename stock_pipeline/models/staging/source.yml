version: 2

sources:
  - name: stock_pipeline
    database: dev
    schema: public
    tables:
      - name: staging_stock_ticks
        description: "Raw daily OHLCV data loaded from S3 gold layer"
        columns:
          - name: ticker
            tests:
              - not_null
          - name: trade_date
            tests:
              - not_null
          - name: close_price
            tests:
              - not_null